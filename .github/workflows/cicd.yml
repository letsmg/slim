name: 🚀 Deploy Slim (Direto)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Criar Pacote de Deploy
        run: |
          mkdir build-tmp
          # COPIA A PASTA INTEIRA (mantendo a subpasta public para o Nginx encontrar)
          cp -r public build-tmp/
          # Copia o .htaccess para dentro da public se ele existir na raiz
          [ -f .htaccess ] && cp .htaccess build-tmp/public/ || echo "Sem .htaccess na raiz"

          cd build-tmp
          zip -r ../deploy-slim.zip .
          cd ..

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Executar Deploy no Servidor
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"

          scp -o StrictHostKeyChecking=no deploy-slim.zip ubuntu@$SERVER_IP:/tmp/

          # REMOVIDAS as aspas de 'EOF' para permitir que o GitHub Actions passe as variáveis corretamente se necessário,
          # e adicionado tratamento rigoroso de comandos.
          ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP << 'EOF'
            set -e

            BASE_DIR="/var/www/slim"

            # 1. Garante que o unzip está instalado no servidor (evita falha silenciosa)
            if ! command -v unzip &> /dev/null; then
                echo "📦 Instalando unzip..."
                sudo apt-get update -y && sudo apt-get install unzip -y
            fi

            # 2. Garante que a pasta base existe
            sudo mkdir -p "$BASE_DIR"

            # 3. Limpa o conteúdo antigo com segurança
            echo "🧹 Limpando diretório antigo..."
            sudo rm -rf "${BASE_DIR:?}"/*

            # 4. Descompacta o novo pacote
            echo "📂 Descompactando novo pacote..."
            sudo unzip -o /tmp/deploy-slim.zip -d "$BASE_DIR"

            # 5. Ajustar permissões para o Nginx (Garante dono e grupo corretos)
            echo "🔒 Ajustando permissões..."
            sudo chown -R www-data:www-data "$BASE_DIR"
            sudo find "$BASE_DIR" -type d -exec chmod 755 {} \;
            sudo find "$BASE_DIR" -type f -exec chmod 644 {} \;

            # 6. Limpeza do arquivo temporário no servidor
            rm -f /tmp/deploy-slim.zip
            
            echo "✅ Deploy Slim Finalizado com sucesso em $BASE_DIR!"
          EOF